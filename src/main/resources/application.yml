spring:
  application:
    name: users

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    url: jdbc:postgresql://localhost:5432/users
    username: users
    password: users
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 100
          order_updates: true # Что делает?
    show-sql: true

  liquibase:
    change-log: classpath:db/changelog/users-changelog-master.yml
    enabled: true


server:
  port: 8080

app:
  import:
    max-errors: 50

# Swagger UI: http://localhost:8080/swagger-ui.html (redirects to /swagger-ui/index.html)
# OpenAPI JSON: http://localhost:8080/v3/api-docs
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
tokens:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    access:
      expiration: 60m
    claim:
      roles: roles # field name in jwt token

  refresh:
    expiration: 30d
    tokensForOneUser: 5
  resetPassword:
    length: 15
    expiration: 15m