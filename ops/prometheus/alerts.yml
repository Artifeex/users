groups:
  - name: service-health
    rules:
      - alert: ServiceDown
        expr: up{job="users-service"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "users-service is down"
          description: "Prometheus cannot scrape users-service for 1 minute."

      - alert: High5xxErrorRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
            /
            sum(rate(http_server_requests_seconds_count[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error ratio"
          description: "5xx ratio is above 5% for 5 minutes."

  - name: infra-health
    rules:
      - alert: LowDiskSpace
        expr: |
          (
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}
            /
            node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}
          ) < 0.15
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space"
          description: "Disk free space is below 15%."

      - alert: KafkaUnderReplicatedPartitions
        expr: kafka_topic_partition_under_replicated_partition > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Kafka under-replicated partitions detected"
          description: "URP is greater than zero for more than 2 minutes."
